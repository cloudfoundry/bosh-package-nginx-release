---
jobs:
- name: bump-versions
  plan:
    - in_parallel:
      - get: nginx-release
      - get: bosh-cli-registry-image
      - get: nginx-src
        trigger: true
    - task: bump-versions
      file: nginx-release/ci/tasks/bump-versions.yml
      image: bosh-cli-registry-image
      params:
        PRIVATE_YML: |
          ---
          blobstore:
            provider: gcs
            options:
              credentials_source: static
              json_key: '((gcp_json_key))'
    - put: nginx-release
      params:
        repository: nginx-release

- name: test
  plan:
  - in_parallel:
    - get: nginx-release
      passed: [bump-versions]
      trigger: true
    - get: stemcell
      resource: container-stemcell-image
    - get: warden-cpi-registry-image
  - task: test
    file: nginx-release/ci/tasks/test.yml
    image: warden-cpi-registry-image
    privileged: true
    params:
      STEMCELL_OS: ubuntu-noble

- name: create-final-release
  plan:
  - in_parallel:
    - get: bosh-cli-registry-image
    - get: nginx-release
      passed: [test]
      trigger: true
  - task: build
    file: nginx-release/ci/tasks/build.yml
    image: bosh-cli-registry-image
    params:
      PRIVATE_YML: |
        ---
        blobstore:
          provider: gcs
          options:
            credentials_source: static
            json_key: '((gcp_json_key))'
  - put: nginx-release
    params:
      repository: nginx-release

resources:
- name: nginx-release
  type: git
  source:
    uri: git@github.com:cloudfoundry/bosh-package-nginx-release
    branch: main
    private_key: ((github_deploy_key_nginx-release.private_key))

- name: nginx-src
  type: http-resource
  source:
    index: "https://nginx.org/download/"
    regex: 'href="nginx-(?P<version>1[0-9.]+)\.tar\.gz"'
    uri: "https://nginx.org/download/nginx-{version}.tar.gz"

- name: bosh-cli-registry-image
  type: registry-image
  source:
    repository: ghcr.io/cloudfoundry/bosh/cli
    username: ((github_read_write_packages.username))
    password: ((github_read_write_packages.password))

- name: warden-cpi-registry-image
  type: registry-image
  source:
    repository: ghcr.io/cloudfoundry/bosh/warden-cpi
    username: ((github_read_write_packages.username))
    password: ((github_read_write_packages.password))

- name: container-stemcell-image
  type: bosh-io-stemcell
  source:
    name: bosh-warden-boshlite-ubuntu-noble

resource_types:
- name: http-resource
  type: docker-image
  source:
    repository: aequitas/http-resource
